server {
    listen 8080;
    server_name localhost;

    # ── Frontend : client_demo.html ───────────────────────────────────────
    root /usr/share/nginx/html;
    index client_demo.html;

    location / {
        try_files $uri $uri/ /client_demo.html;
    }

    # ── Proxy API REST → rag-api:8000 ─────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://rag-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Proxy WebSocket → rag-api:8000 ────────────────────────────────────
    location /detect/stream/ {
        proxy_pass         http://rag-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_read_timeout 3600s;   # connexion longue pour le stream live
        proxy_send_timeout 3600s;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
