# ansible/playbooks/setup_gpu.yml — version simplifiée pour DLAMI
- name: Verify GPU setup on DLAMI
  hosts: all
  become: true

  tasks:
    - name: nvidia-smi host
      command: nvidia-smi
      register: smi
      changed_when: false

    - name: Afficher
      debug:
        msg: "{{ smi.stdout_lines }}"

    - name: Test Docker GPU
      command: docker run --rm --gpus all nvcr.io/nvidia/cuda:12.2.0-runtime-ubuntu22.04 nvidia-smi
      changed_when: false